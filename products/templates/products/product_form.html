{% extends 'base.html' %}

{% block title %}Add / Edit Product{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm">
    <h1 class="text-2xl font-bold mb-4">{% if object %}Edit{% else %}Add{% endif %} Product</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex gap-3">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
            <a href="{% url 'products:product_list' %}" class="px-4 py-2 border rounded">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
